services:
  - type: web
    name: duplicate-checker-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SIMILARITY_THRESHOLD
        value: 90
      - key: MAX_FUZZY_CANDIDATES
        value: 300
      - key: FRONTEND_ORIGIN
        sync: false
